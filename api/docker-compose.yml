# Disposable local PostgreSQL for schema/migration validation (ADR-0013
# Phase 5 pre-step). Local-only credentials — never production values.
#
# Host port 5433 (5432 is occupied by an unrelated Postgres on dev machines).
#   Start:    docker compose up -d
#   Teardown: docker compose down -v   (removes data — disposable by design)
services:
  postgres:
    image: postgres:16-alpine
    container_name: appfitness-postgres-dev
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: appfitness
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: appfitness_dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appfitness -d appfitness_dev']
      interval: 3s
      timeout: 3s
      retries: 15
