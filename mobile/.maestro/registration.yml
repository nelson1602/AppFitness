# ADR-P008 — registration → empty dashboard (requires the seeded-local-API
# setup: api/ running on the host, a FRESH disposable database, and
# `adb reverse tcp:3001 tcp:3001` so the release build's 127.0.0.1 API URL
# reaches the host).
#
# The sign-in surface ships with EMPTY fields (release product gate) —
# credentials are typed via testIDs and MUST be passed per run (no flow
# env defaults: they would shadow -e overrides):
#   maestro test -e E2E_EMAIL=demo@appfitness.local \
#                -e E2E_USERNAME=demo -e E2E_PASSWORD=password12345 \
#                .maestro/registration.yml
# Fake, synthetic identities only; fresh disposable DB per run.
appId: com.appfitness.mobile
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: 'AppFitness'
    timeout: 30000

# Switch to register mode and enter the disposable identity.
- tapOn: 'Create a local account'
- assertVisible: 'Register'
- tapOn:
    id: 'input-email'
- inputText: ${E2E_EMAIL}
- tapOn:
    id: 'input-username'
- inputText: ${E2E_USERNAME}
- tapOn:
    id: 'input-password'
- inputText: ${E2E_PASSWORD}
- hideKeyboard
- tapOn: 'Register'

# Registration hits the local API, then routes to the dashboard, which
# renders the empty/data-gap state for a brand-new account.
- extendedWaitUntil:
    visible: 'Finish your baseline'
    timeout: 45000
- assertVisible: 'Create your profile'
- assertVisible: 'Your local iCoach assessment'

# Dev-only seed action must not exist in release builds.
- assertNotVisible: 'Load sample data'
