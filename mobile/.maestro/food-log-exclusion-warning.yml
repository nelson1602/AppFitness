# ADR-P014 / FEATURE-006 Slice 4 — food-log excluded-food warning.
#
# Proves the non-blocking dietary-preference warning on the food log: add a
# "Nuts" allergy via the dietary-preferences surface (Slice 2B), then open the
# food log, select a nut food (Almonds → carries avoidFor: nut_allergy), see the
# allergy/sensitivity warning, and confirm the food can STILL be logged (the
# warning never hard-blocks). Fake synthetic identity; disposable DB.
#
# Wired into mobile-e2e.yml after food-log.yml — reuses the persisted `onboard`
# session established by onboarding-loop.yml (no -e vars needed). Requires an
# EAS `e2e` APK built from the Slice 4 commit (878af06) or later; an older APK
# predating the warning UI will fail the warning assertions.
appId: com.appfitness.mobile
---
- launchApp

# Session restore → populated dashboard for the onboard account.
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 45000

# --- Add a "Nuts" allergy via the dietary-preferences surface (Slice 2B) ---
- scrollUntilVisible:
    element: 'Dietary preferences'
- tapOn: 'Dietary preferences'
- extendedWaitUntil:
    visible: 'Dietary preferences & allergies'
    timeout: 15000
# Category exclusion + allergy kind are the defaults; pick the "Nuts" tag.
# The tag chips sit below the intro copy + mode/kind rows — scroll the chip
# into view before tapping (same pattern as food-log.yml's submit button).
- scrollUntilVisible:
    element:
      id: 'dp-tag-nut_allergy'
- tapOn:
    id: 'dp-tag-nut_allergy'
- scrollUntilVisible:
    element:
      id: 'dp-add'
- tapOn:
    id: 'dp-add'
# The new entry lands in "Your exclusions" below the add card — scroll it into
# view to confirm it persisted (a static wait would time out off-screen).
- scrollUntilVisible:
    element: 'Nuts · category'

# --- Navigate to the food log via dashboard → Nutrition → meal plan ---
- back
- scrollUntilVisible:
    element: 'Nutrition'
- tapOn: 'Nutrition'
- scrollUntilVisible:
    element: '15-day meal plan'
- tapOn: '15-day meal plan'
- extendedWaitUntil:
    visible:
      id: 'open-food-log'
    timeout: 15000
- tapOn:
    id: 'open-food-log'
- extendedWaitUntil:
    visible: 'Food log'
    timeout: 15000

# --- Select a nut food → the allergy/sensitivity warning appears ---
- tapOn:
    id: 'food-search-input'
- inputText: 'almonds'
- hideKeyboard
- extendedWaitUntil:
    visible: 'Almonds'
    timeout: 10000
# Select the catalog result by its testID — the plain name "Almonds" collides
# with the "almonds" search query text, so tap the result row explicitly.
- tapOn:
    id: 'food-option-food.almonds'
# The non-blocking warning renders below the selected food — scroll it in.
- scrollUntilVisible:
    element: 'Heads up — this matches an allergy or sensitivity'
# Advisory, not a medical directive. The disclaimer is the banner's last line,
# below the title — scroll it into view rather than asserting statically.
- scrollUntilVisible:
    element: '.*not emergency medical advice.*'

# --- The warning never blocks: the food can still be logged ---
- scrollUntilVisible:
    element:
      id: 'food-log-add-submit'
- tapOn:
    id: 'food-log-add-submit'
- scrollUntilVisible:
    element: 'Almonds'
- assertVisible: 'Almonds'
