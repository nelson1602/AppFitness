# Phase 16 Slice 8 — Workout module E2E (ADR-P015).
#
# Proves the device-side workout journey end to end, including the read-only
# iCoach TrainingPlan integration (Slice 7):
#   1. dashboard → routine builder;
#   2. TrainingPlan guidance card is visible (never recomputed — read from the
#      deterministic assessment);
#   3. a knee restriction (added on-device) makes the plan carry
#      excludedMovements, so the built-in "Back squat" (deep_squat) shows the
#      NON-blocking excluded-movement caution — it never blocks the action;
#   4. create a routine and add a built-in catalog exercise to it;
#   5. dashboard → workout log;
#   6. start a workout and log a set against a built-in exercise;
#   7. the saved set is visible and surfaced as pending (local-first).
#
# The knee restriction is deterministic safety data: BODY_AREA_EXCLUSIONS.knee =
# jumping/deep_squat/lunge/high_impact_cardio (see icoach/domain/restrictions.ts).
# A MILD injury (no severity → not blocked / no clearance / no cap) keeps the
# plan in the "ready" guidance state while still excluding those movements.
#
# Prereqs (same seeded-local-API setup as the other flows): api/ running on the
# host, a disposable database, and `adb reverse tcp:3001 tcp:3001`. Runs on the
# persisted `onboard` session (established by onboarding-loop.yml). Because it is
# sequenced after medical-management.yml — which soft-deletes the onboard weight
# evaluation — this flow FIRST restores the assessment baseline (re-records a
# weight) so a TrainingPlan exists, then exercises the workout journey. No -e
# vars needed; the session is restored on launch. Fake synthetic identity;
# disposable DB.
#
# Requires an EAS `e2e` APK built from the Phase 16 Slice 5–7 commits (the
# workout routes/screens) or later; an older APK predating the workout UI will
# fail immediately (no "Workout routines" entry point).
appId: com.appfitness.mobile
---
- launchApp

# Session restore → the dashboard for the onboard account. This flow runs
# after medical-management.yml, which soft-deletes the onboard weight
# evaluation, so the assessment is NOT ready here — the always-present header
# is the stable landing signal, not "Today's assessment".
- extendedWaitUntil:
    visible: 'Your local iCoach assessment'
    timeout: 45000

# --- Restore the assessment baseline: re-record a weight so the deterministic
#     iCoach assessment returns to `ready` and a TrainingPlan exists (the prior
#     flow removed it). Uses the dashboard data-gap action, like
#     onboarding-loop.yml. ---
- scrollUntilVisible:
    element:
      id: 'gap-fix-weight'
- tapOn:
    id: 'gap-fix-weight'
- extendedWaitUntil:
    visible:
      id: 'field-weightKg'
    timeout: 15000
- tapOn:
    id: 'field-weightKg'
- inputText: '82'
- hideKeyboard
- scrollUntilVisible:
    element: 'Save evaluation'
- tapOn: 'Save evaluation'
# With a local profile + weight + goal, the assessment reaches `ready`.
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 30000

# --- Add an active knee restriction so the TrainingPlan carries
#     excludedMovements (deterministic: knee → deep_squat, lunge, jumping,
#     high_impact_cardio). Body area must be exactly "knee" to map. ---
- scrollUntilVisible:
    element: 'Restrictions & injuries'
- tapOn: 'Restrictions & injuries'
- extendedWaitUntil:
    visible: 'Add a restriction'
    timeout: 15000
# Type defaults to Injury; leave severity unset (MILD-equivalent → no cap,
# not blocked, no clearance). Only the body area drives the exclusions.
- tapOn:
    id: 'field-bodyArea'
- inputText: 'knee'
- hideKeyboard
- scrollUntilVisible:
    element: 'Add restriction'
- tapOn: 'Add restriction'
# Confirm it persisted into the active list before leaving.
- scrollUntilVisible:
    element: 'Injury · knee'

# Relaunch so the dashboard REMOUNTS and its mount-time refresh recomputes the
# assessment WITH the now-active knee restriction — the plan then carries
# excludedMovements. A plain `back` pop does not remount the dashboard, so its
# refresh would not re-run and the plan's excludedMovements would stay empty.
# The re-recorded weight + the knee restriction are persisted locally, so they
# survive the relaunch (no data re-entry needed). Cold launch lands at the top
# of a ready dashboard.
- launchApp
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 45000

# --- 1. Navigate: dashboard → Workout routines ---
- scrollUntilVisible:
    element: 'Workout routines'
- tapOn: 'Workout routines'

# --- 2/3. TrainingPlan guidance is surfaced read-only (top of the screen). The
#     guidance card is reactive to the refreshed dashboard store, so waiting on
#     it also gates on the recompute completing. "Movements to avoid" only
#     renders when excludedMovements is non-empty → proves the knee restriction
#     propagated into the plan. ---
- extendedWaitUntil:
    visible: 'Your training guidance'
    timeout: 30000
- scrollUntilVisible:
    element: '.*Movements to avoid.*deep_squat.*'

# --- 4. Create a routine, then view its exercises and add a built-in one. ---
- scrollUntilVisible:
    element:
      id: 'routine-name'
- tapOn:
    id: 'routine-name'
- inputText: 'E2E push'
- hideKeyboard
- scrollUntilVisible:
    element:
      id: 'routine-create'
- tapOn:
    id: 'routine-create'
# The created routine lands in "Your routines" below the create card.
- scrollUntilVisible:
    element: 'E2E push'
- tapOn: 'View exercises'

# --- The built-in catalog list appears; Back squat (deep_squat) shows the
#     NON-blocking excluded-movement caution. ---
- scrollUntilVisible:
    element:
      id: 'add-exercise-exercise.back_squat'
- scrollUntilVisible:
    element: '.*May conflict.*deep_squat.*'
# Add it to the routine (the warning never blocks the action).
- tapOn:
    id: 'add-exercise-exercise.back_squat'
# The routine now lists the exercise (top of the routine's exercise list).
- scrollUntilVisible:
    element: 'Back squat'

# --- 5. Navigate: dashboard → Log a workout ---
# `back` restores the dashboard's scrolled position (near "Workout routines"),
# so scroll straight to the next entry point rather than asserting the
# above-the-fold assessment header.
- back
- scrollUntilVisible:
    element: 'Log a workout'
- tapOn: 'Log a workout'
- extendedWaitUntil:
    visible: 'Start a workout'
    timeout: 15000

# --- 6. Start an ad-hoc workout and log a set against a built-in exercise. ---
- tapOn:
    id: 'workout-name'
- inputText: 'E2E session'
- hideKeyboard
- tapOn:
    id: 'workout-start'
# The open workout appears under "Open workouts"; open its set list.
- scrollUntilVisible:
    element: 'E2E session'
- tapOn: 'Log sets'
# Choose a built-in exercise, enter reps + weight, and add the set.
- scrollUntilVisible:
    element:
      id: 'set-exercise-exercise.back_squat'
- tapOn:
    id: 'set-exercise-exercise.back_squat'
- tapOn:
    id: 'set-reps-input'
- inputText: '5'
- hideKeyboard
- tapOn:
    id: 'set-weight-input'
- inputText: '100'
- hideKeyboard
- scrollUntilVisible:
    element:
      id: 'set-add'
- tapOn:
    id: 'set-add'

# --- 7. The saved set is visible and local-first (pending sync). ---
- scrollUntilVisible:
    element: '1. Back squat'
- assertVisible: 'Pending sync'

# --- Finish the workout → it moves to "Recent workouts". ---
- scrollUntilVisible:
    element: 'Finish'
- tapOn: 'Finish'
# Finishing collapses the open card and shifts the layout, so scroll the
# "Recent workouts" section into view rather than asserting statically.
- scrollUntilVisible:
    element: 'Recent workouts'
- assertVisible: 'Finished'
