# Phase 14 Slice 2 — medical management (restrictions + evaluation history).
#
# Runs AFTER onboarding-loop.yml for the SAME account (session persisted;
# the dashboard already has a profile, a device-entered weight evaluation,
# and a goal). Exercises the two new management surfaces entirely on the
# device:
#   - add an active restriction, see it listed, then end it;
#   - open evaluation history, see the recorded weight, soft-delete it.
#
# Prereqs: api/ running, `adb reverse tcp:3001 tcp:3001`. No seed. Fake,
# synthetic data only.
appId: com.appfitness.mobile
---
- launchApp

- extendedWaitUntil:
    visible: 'Your local iCoach assessment'
    timeout: 30000

# --- Restrictions: add → list → end ---
- scrollUntilVisible:
    element: 'Restrictions & injuries'
- tapOn: 'Restrictions & injuries'
- extendedWaitUntil:
    visible: 'Add a restriction'
    timeout: 15000
# Type defaults to Injury and effective-from to today; add a body area.
# (The empty-state text lives below the add form, so it is not asserted
# up front — the add/end round-trip below is the real proof.)
- tapOn:
    id: 'field-bodyArea'
- inputText: 'left knee'
- hideKeyboard
- scrollUntilVisible:
    element: 'Add restriction'
- tapOn: 'Add restriction'

# The new restriction appears in the active list (below the add form).
- scrollUntilVisible:
    element: 'Injury · left knee'

# End it → the restriction leaves the active list.
- scrollUntilVisible:
    element: 'End restriction'
- tapOn: 'End restriction'
- extendedWaitUntil:
    notVisible: 'Injury · left knee'
    timeout: 15000

# Back to the dashboard. Its scroll position is preserved near the medical
# buttons, so go straight to the history entry point (which also confirms
# we landed back on the dashboard — the button exists only there).
- back

# --- Evaluation history: view → soft-delete ---
- scrollUntilVisible:
    element: 'Evaluation history'
- tapOn: 'Evaluation history'
# Wait for the loaded list: the weight recorded during onboarding shows as
# "82 kg" in the summary.
- extendedWaitUntil:
    visible: '.*82 kg.*'
    timeout: 15000

# Two-step soft-delete → the history empties.
- scrollUntilVisible:
    element: 'Remove'
- tapOn: 'Remove'
- tapOn: 'Confirm remove'
- extendedWaitUntil:
    notVisible: '.*82 kg.*'
    timeout: 15000
- assertVisible: 'No evaluations recorded yet.'
