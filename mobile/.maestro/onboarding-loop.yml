# ADR-P008 / TEST-004 — full device-side onboarding loop.
#
# Proves the complete production-path loop that Phases 13–14 unlocked: a
# brand new account enters its profile, physical evaluation (weight), and
# goal ENTIRELY ON THE DEVICE through the dashboard gap actions; the iCoach
# assessment reaches `ready` from purely local data (no server seeding);
# local changes sync and the pending state clears; and the account can sign
# out and back in with its data intact.
#
# Prereqs (same seeded-local-API setup as registration.yml): api/ running
# on the host, a FRESH disposable database, and `adb reverse tcp:3001
# tcp:3001`. Run AFTER registration.yml (creates the persisted session for
# the SAME account). No server seed step is required — every data point is
# entered on the device. Credentials are passed per run (the release
# sign-in surface ships with empty fields):
#
#   maestro test -e E2E_EMAIL=<addr> -e E2E_PASSWORD=<pw> .maestro/onboarding-loop.yml
#
# Fake, synthetic identities only; fresh disposable DB per run.
appId: com.appfitness.mobile
---
- launchApp

# Session restore → dashboard empty/data-gap state for the new account.
- extendedWaitUntil:
    visible: 'Your local iCoach assessment'
    timeout: 30000
- assertVisible: 'Finish your baseline'
- assertVisible: 'Create your profile'
# Dev-only seed action must never appear in a release build.
- assertNotVisible: 'Load sample data'

# --- 1. Complete the profile through the dashboard gap action ---
- tapOn:
    id: 'gap-fix-profile'
- extendedWaitUntil:
    visible:
      id: 'field-birthDate'
    timeout: 15000
- tapOn:
    id: 'field-birthDate'
- inputText: '1990-01-15'
- hideKeyboard
- tapOn:
    id: 'field-heightCm'
- inputText: '178'
- hideKeyboard
# Selecting a sex avoids the "undisclosed sex" note so the ready-state card
# carries only the goal note. Fitness level and activity level default to
# valid selections already.
- tapOn:
    id: 'option-gender-MALE'
- scrollUntilVisible:
    element: 'Save profile'
- tapOn: 'Save profile'

# Back on the dashboard: profile / birth-date / height gaps close. Weight
# remains, so the assessment is still incomplete.
- extendedWaitUntil:
    visible: 'Your local iCoach assessment'
    timeout: 30000
- assertNotVisible: 'Create your profile'
- assertNotVisible: 'Add your birth date'
- assertNotVisible: 'Add your height'
- assertVisible: 'Record a weight measurement'

# --- 2. Record a physical evaluation (weight) through the gap action ---
- tapOn:
    id: 'gap-fix-weight'
- extendedWaitUntil:
    visible:
      id: 'field-weightKg'
    timeout: 15000
# The evaluation date defaults to today; only weight is required.
- tapOn:
    id: 'field-weightKg'
- inputText: '82'
- hideKeyboard
- scrollUntilVisible:
    element: 'Save evaluation'
- tapOn: 'Save evaluation'

# Back on the dashboard: with a local profile + local weight, the iCoach
# assessment reaches `ready` from purely local data — no server round-trip.
# The weight gap closes; the maintenance-goal note appears below the
# assessment, so scroll it into view.
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 30000
- assertVisible: '.*kcal.*'
- assertNotVisible: 'Record a weight measurement'
- scrollUntilVisible:
    element: 'Using maintenance goal'

# --- 3. Complete the active goal through the dashboard gap action ---
- tapOn:
    id: 'gap-fix-default-goal'
- extendedWaitUntil:
    visible: 'Set your goal'
    timeout: 15000
- tapOn:
    id: 'option-goalType-FAT_LOSS'
# The save button is below the goal-type chips + optional fields; scroll
# it into view (mirrors the profile form).
- scrollUntilVisible:
    element: 'Save goal'
- tapOn: 'Save goal'

# Back on the dashboard (scrolled to top after remount): the
# maintenance-goal note clears (iCoach recalculated with the chosen goal)
# and, with sex + goal both set, the setup card disappears entirely while
# the assessment stays.
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 30000
- assertNotVisible: 'Using maintenance goal'
- assertNotVisible: 'Finish your baseline'
- assertVisible: '.*kcal.*'

# --- 4. Sync the local profile + goal; the pending state clears ---
- tapOn: 'Sync now'
- extendedWaitUntil:
    visible: 'Local data ready'
    timeout: 60000
# With the setup card gone, confirm the iCoach recommendations render
# below the assessment (scroll-aware; they are below the fold).
- scrollUntilVisible:
    element: 'iCoach recommendations'

# --- 4b. Nutrition targets surface (Phase 15 Slice 1) ---
- scrollUntilVisible:
    element: 'Nutrition'
- tapOn: 'Nutrition'
- extendedWaitUntil:
    visible: 'Nutrition targets'
    timeout: 15000
# Calorie target + macro breakdown render from the deterministic engine.
- assertVisible: '.*kcal.*'
- assertVisible: 'Protein'
# No dev-only sample-data path on this surface.
- assertNotVisible: 'Load sample data'
- back

# --- 5. Sign out, then sign back in as the SAME existing account ---
- scrollUntilVisible:
    element: 'Sign out'
- tapOn: 'Sign out'
- extendedWaitUntil:
    visible: 'Sign in to continue.'
    timeout: 30000
- tapOn:
    id: 'input-email'
- inputText: ${E2E_EMAIL}
- hideKeyboard
- tapOn:
    id: 'input-password'
- inputText: ${E2E_PASSWORD}
- hideKeyboard
# "Sign in" is also the navigation header title, so match the submit
# button specifically by its position below the password field (a bare
# text match hits the header first, which is a no-op).
- tapOn:
    text: 'Sign in'
    below:
      id: 'input-password'

# Existing account restores straight to the populated, already-synced
# dashboard — local data survived sign-out.
- extendedWaitUntil:
    visible: "Today's assessment"
    timeout: 45000
- assertVisible: 'Local data ready'
- assertNotVisible: 'Finish your baseline'
- assertNotVisible: 'Load sample data'
